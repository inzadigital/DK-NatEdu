<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NatEdu · Durango Kirolak</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#007032;--g2:#005828;--g3:#e6f4ec;--g4:#c8e8d4;
  --b:#00475C;--b2:#003347;--b3:#e0eff4;
  --gl:#6AB023;--gl2:#4e8018;--gl3:#eef6e0;
  --bg:#f2f5f2;--white:#fff;
  --txt:#162216;--txt2:#3d5c3d;--txtm:#7a957a;
  --bdr:#cde0d0;--bdr2:#aacfb4;
  --warn:#f59e0b;--red:#e53935;--reds:#fdecea;
  --r:14px;--rs:9px;
  --nav:66px;--hdr:56px;
  --fn:'Nunito',system-ui,sans-serif
}
body{font-family:var(--fn);background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:var(--g);height:var(--hdr);display:flex;align-items:center;padding:0 14px;gap:10px;box-shadow:0 2px 10px rgba(0,112,50,.25)}
.hdr-back{width:36px;height:36px;border:none;background:rgba(255,255,255,.18);color:white;border-radius:8px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--fn)}
.hdr-t{flex:1;font-size:15px;font-weight:800;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo{display:flex;align-items:center;gap:8px;flex:1}
.logo-dk{display:flex;flex-direction:column;line-height:1.1}
.logo-d{font-size:13px;font-weight:900;color:white;letter-spacing:1.5px;text-transform:uppercase}
.logo-k{font-size:13px;font-weight:900;color:var(--gl)}
.logo-sq{width:30px;height:30px;background:white;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.22);color:white;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--white);border-top:1.5px solid var(--bdr);display:flex;z-index:200}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--txtm);font-family:var(--fn);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding-bottom:4px}
.nv.on{color:var(--g)}
.nv-i{font-size:21px;line-height:1}

/* ── MAIN ── */
.main{padding:14px;padding-bottom:calc(var(--nav)+14px);max-width:560px;margin:0 auto}

/* ── SECTION HEADER ── */
.sh{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.9px;color:var(--txtm);margin:18px 0 8px;display:flex;align-items:center;justify-content:space-between}

/* ── CARD ── */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--bdr);padding:15px;margin-bottom:10px}

/* ── SESSION CARD (home & calendar) ── */
.scard{background:var(--white);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.scard.ev{border-color:var(--gl);border-left:4px solid var(--gl)}
.scard.pend{border-left:4px solid var(--b)}
.scard:active{opacity:.93}
.scard-hdr{padding:14px 14px 12px;display:flex;gap:12px;align-items:flex-start}
.scard-hora{font-size:26px;font-weight:900;color:var(--g);line-height:1;min-width:58px}
.scard-info{flex:1}
.scard-nom{font-size:15px;font-weight:800;color:var(--txt);margin-bottom:2px;line-height:1.25}
.scard-sub{font-size:12px;color:var(--txt2);font-weight:600}
.scard-st{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;flex-shrink:0;align-self:flex-start}
.st-ev{background:var(--gl3);color:var(--gl2)}
.st-pend{background:var(--b3);color:var(--b2)}
.scard-tags{padding:0 14px 12px;display:flex;gap:5px;flex-wrap:wrap}

/* ── TAGS ── */
.tag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.2px}
.tg{background:var(--g3);color:var(--g2)}
.tb{background:var(--b3);color:var(--b2)}
.tgl{background:var(--gl3);color:var(--gl2)}
.tw{background:var(--bg);color:var(--txtm);border:1px solid var(--bdr)}

/* ── SESSION DETAIL ── */
.sec-hdr{background:var(--g);padding:16px 14px;margin:-14px -14px 14px}
.sec-cod{font-size:11px;font-weight:900;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.sec-nom{font-size:18px;font-weight:900;color:white;line-height:1.2;margin-bottom:6px}
.sec-meta{display:flex;gap:6px;flex-wrap:wrap}
.sec-mtag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:12px;background:rgba(255,255,255,.18);color:white}

.blk{margin-bottom:14px}
.blk-title{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.9px;color:var(--txtm);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.blk-title::after{content:'';flex:1;height:1px;background:var(--bdr)}

.mat-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:14px;font-weight:600;color:var(--txt);line-height:1.4}
.mat-item:last-child{border:none}
.mat-dot{width:7px;height:7px;border-radius:50%;background:var(--gl);flex-shrink:0;margin-top:4px}

.act{border-radius:var(--rs);padding:13px;margin-bottom:8px}
.act-arr{background:var(--g3);border-left:3px solid var(--g)}
.act-int{background:var(--b3);border-left:3px solid var(--b)}
.act-ref{background:var(--gl3);border-left:3px solid var(--gl)}
.act-lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.act-arr .act-lbl{color:var(--g2)}
.act-int .act-lbl{color:var(--b2)}
.act-ref .act-lbl{color:var(--gl2)}
.act-txt{font-size:13px;font-weight:600;color:var(--txt);line-height:1.6}

.pto{background:var(--bg);border-radius:var(--rs);padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--txt2)}

/* ── EVAL ── */
.eval-section{background:var(--white);border-radius:var(--r);border:2px solid var(--bdr);overflow:hidden;margin-top:20px}
.eval-hdr{background:var(--g);padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.eval-hdr-t{font-size:14px;font-weight:900;color:white}
.eval-hdr-st{font-size:11px;font-weight:800;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.2);color:white}
.eval-hdr-st.done{background:var(--gl);color:white}
.eval-body{padding:14px}

.crit{margin-bottom:16px}
.crit-lbl{font-size:12px;font-weight:800;color:var(--txt);margin-bottom:8px}
.scale{display:flex;gap:4px}
.sb{flex:1;height:48px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--bg);color:var(--txtm);font-family:var(--fn);font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.sb:active{transform:scale(.93)}
.sb.sel-n2,.sb.sel-n1{background:#fde8e8;border-color:#f43f5e;color:#b91c1c}
.sb.sel-0{background:var(--b3);border-color:var(--b);color:var(--b2)}
.sb.sel-p1,.sb.sel-p2{background:var(--g3);border-color:var(--g);color:var(--g2)}

.stars-row{display:flex;justify-content:center;gap:8px;padding:6px 0 2px}
.star{font-size:40px;cursor:pointer;color:#d8e8d8;transition:color .1s,transform .1s;line-height:1}
.star.on{color:var(--warn)}
.star:active{transform:scale(.9)}

.cmt{width:100%;background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;color:var(--txt);font-family:var(--fn);font-size:14px;padding:11px 13px;resize:none;outline:none;min-height:68px;font-weight:600;line-height:1.5;transition:border-color .2s}
.cmt:focus{border-color:var(--g)}
.autosave{text-align:right;font-size:11px;font-weight:700;color:var(--gl2);margin-top:5px;height:16px;transition:opacity .3s;opacity:0}
.autosave.show{opacity:1}

/* ── CALENDAR ── */
.wk{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:14px}
.wd{background:var(--white);border-radius:10px;border:1.5px solid var(--bdr);padding:9px 4px;text-align:center;cursor:pointer}
.wd.today{border-color:var(--g);background:var(--g3)}
.wd.sel{border-color:var(--b);background:var(--b3)}
.wd-n{font-size:9px;font-weight:900;color:var(--txtm);text-transform:uppercase;letter-spacing:.4px}
.wd-d{font-size:17px;font-weight:900;color:var(--txt);margin:3px 0 2px}
.wd.today .wd-d{color:var(--g2)}
.wd.sel .wd-d{color:var(--b2)}
.wd-dot{width:5px;height:5px;border-radius:50%;background:var(--g);margin:0 auto}

/* ── LIBRARY ── */
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:7px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:transparent;color:var(--txtm);font-family:var(--fn);font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0}
.chip.on{background:var(--g);border-color:var(--g);color:white}

/* ── IDEAS ── */
.ic{background:var(--white);border-radius:var(--r);border:1px solid var(--bdr);padding:13px;margin-bottom:8px}
.ic-txt{font-size:14px;font-weight:600;color:var(--txt);line-height:1.55;margin-bottom:8px}
.ic-ft{display:flex;align-items:center;justify-content:space-between}
.ic-meta{font-size:11px;color:var(--txtm);font-weight:700}
.ic-sel{font-size:12px;font-weight:800;padding:4px 10px;border-radius:12px;border:1.5px solid var(--bdr);background:transparent;color:var(--txt2);font-family:var(--fn);cursor:pointer;outline:none}

/* ── CHAT ── */
.chatbox{min-height:180px;max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;margin-bottom:11px;padding:4px 0}
.msg{padding:10px 13px;border-radius:12px;font-size:13px;font-weight:600;line-height:1.55;max-width:90%}
.msg-u{background:var(--g);color:white;align-self:flex-end;border-bottom-right-radius:3px}
.msg-a{background:var(--bg);color:var(--txt);border:1px solid var(--bdr);align-self:flex-start;border-bottom-left-radius:3px}
.cin{display:flex;gap:8px}
.cin input{flex:1;background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;color:var(--txt);font-family:var(--fn);font-size:14px;padding:11px 13px;outline:none;font-weight:600}
.cin input:focus{border-color:var(--g)}
.csend{width:46px;height:46px;border-radius:9px;background:var(--g);border:none;color:white;font-size:19px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* ── METRICS ── */
.mc{background:var(--white);border-radius:var(--rs);border:1px solid var(--bdr);padding:13px;text-align:center}
.mv{font-size:24px;font-weight:900;color:var(--g)}
.ml{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--txtm);margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.bw{margin-bottom:9px}
.bl{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:4px;color:var(--txt2)}
.bl b{color:var(--txt)}
.bt{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px}

/* ── LOGIN ── */
.lwrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;background:var(--bg)}
.lcard{width:100%;max-width:340px;background:var(--white);border-radius:20px;border:1px solid var(--bdr);padding:28px 22px;box-shadow:0 4px 24px rgba(0,112,50,.08)}
.llogo{width:56px;height:56px;background:var(--g);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.ltop{text-align:center;margin-bottom:22px}
.lname{font-size:22px;font-weight:900;color:var(--txt);margin-bottom:2px}
.lsub{font-size:13px;color:var(--txtm);font-weight:600}
.rbtn{display:flex;flex-direction:column;align-items:center;gap:7px;padding:16px 10px;border-radius:12px;border:2px solid var(--bdr);background:var(--bg);cursor:pointer;font-family:var(--fn);font-size:13px;font-weight:800;color:var(--txt2);transition:all .15s;width:100%}
.rbtn.sel{border-color:var(--g);background:var(--g3);color:var(--g2)}
.rbtn-i{font-size:28px}
.ini-grid{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 16px}
.ini-btn{padding:9px 12px;border-radius:9px;border:1.5px solid var(--bdr);background:var(--bg);color:var(--txt2);font-family:var(--fn);font-size:13px;font-weight:900;cursor:pointer;transition:all .15s}
.ini-btn.sel{border-color:var(--g);background:var(--g3);color:var(--g2)}
.lbtn{width:100%;padding:14px;border-radius:11px;background:var(--g);color:white;font-family:var(--fn);font-size:15px;font-weight:900;cursor:pointer;border:none;transition:opacity .2s}
.lbtn:disabled{opacity:.4;cursor:default}
label{font-size:11px;font-weight:800;color:var(--txtm);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.pw-inp{width:100%;background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;color:var(--txt);font-family:var(--fn);font-size:15px;padding:12px;outline:none;margin-bottom:14px;font-weight:600}
.pw-inp:focus{border-color:var(--g)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--txtm)}
.empty-i{font-size:44px;margin-bottom:10px}
.empty-t{font-size:15px;font-weight:700}

/* ── BTN ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:11px;font-family:var(--fn);font-size:14px;font-weight:800;cursor:pointer;border:none;width:100%;transition:opacity .15s}
.btn:active{opacity:.85}
.btn-g{background:var(--g);color:white}
.btn-o{background:transparent;border:1.5px solid var(--bdr2);color:var(--txt2)}
.btn-b{background:var(--b);color:white}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--g);color:white;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:800;opacity:0;transition:opacity .25s;z-index:999;white-space:nowrap;pointer-events:none}
#toast.on{opacity:1}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .22s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1s infinite}

/* ══════════════════════════════════════════════
   ADMIN PC LAYOUT — activated when body.admin-pc
   Only applies on viewport ≥ 960px
   ══════════════════════════════════════════════ */
@media(min-width:960px){
  body.admin-pc{background:#eef1ee}
  body.admin-pc .hdr,body.admin-pc .nav{display:none}
  body.admin-pc .main{display:none}

  /* Shell */
  .ashell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .asb{background:var(--g);color:white;padding:20px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
  .asb-logo{display:flex;align-items:center;gap:10px;padding:4px 8px 18px;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:16px}
  .asb-sq{width:36px;height:36px;background:white;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .asb-tit{display:flex;flex-direction:column;line-height:1.1}
  .asb-d{font-size:14px;font-weight:900;color:white;letter-spacing:1.5px}
  .asb-k{font-size:13px;font-weight:900;color:var(--gl)}
  .asb-nm{font-size:18px;font-weight:900;color:white;padding:4px 8px;margin-bottom:2px}
  .asb-sub{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);padding:0 8px 16px;letter-spacing:.5px;text-transform:uppercase}
  .asb-items{flex:1;display:flex;flex-direction:column;gap:3px}
  .asb-it{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:9px;color:rgba(255,255,255,.75);font-size:13.5px;font-weight:700;cursor:pointer;border:none;background:transparent;font-family:var(--fn);text-align:left;transition:background .1s}
  .asb-it:hover{background:rgba(255,255,255,.08);color:white}
  .asb-it.on{background:rgba(255,255,255,.14);color:white;font-weight:800}
  .asb-it-i{font-size:17px;width:20px;text-align:center}
  .asb-ft{border-top:1px solid rgba(255,255,255,.15);padding-top:14px;display:flex;align-items:center;gap:10px}
  .asb-av{width:36px;height:36px;border-radius:50%;background:var(--gl);color:white;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center}
  .asb-usr{flex:1;line-height:1.2}
  .asb-usr-n{font-size:13px;font-weight:800;color:white}
  .asb-usr-r{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .asb-exit{background:rgba(255,255,255,.1);border:none;width:30px;height:30px;border-radius:7px;color:white;font-size:13px;cursor:pointer;font-family:var(--fn)}

  /* Content area */
  .acont{padding:0;overflow-x:hidden}
  .atop{background:white;border-bottom:1px solid var(--bdr);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .atop-l{display:flex;align-items:baseline;gap:12px}
  .atop-t{font-size:22px;font-weight:900;color:var(--txt)}
  .atop-d{font-size:13px;font-weight:700;color:var(--txtm);text-transform:capitalize}
  .atop-r{display:flex;gap:10px}
  .atop-btn{padding:9px 16px;border-radius:9px;font-size:13px;font-weight:800;font-family:var(--fn);cursor:pointer;border:none;display:flex;align-items:center;gap:6px}
  .atop-btn.pri{background:var(--g);color:white}
  .atop-btn.sec{background:transparent;border:1.5px solid var(--bdr);color:var(--txt2)}
  .atop-btn:hover{opacity:.9}

  .abody{padding:24px 28px 40px;max-width:1280px}

  /* Dashboard KPI grid */
  .akpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .akpi{background:white;border:1px solid var(--bdr);border-radius:12px;padding:16px 18px}
  .akpi-lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--txtm);margin-bottom:6px}
  .akpi-v{font-size:30px;font-weight:900;color:var(--txt);line-height:1.1}
  .akpi-sub{font-size:12px;font-weight:700;color:var(--txt2);margin-top:3px}
  .akpi-ic{float:right;font-size:20px;margin-top:2px;opacity:.5}
  .akpi.g .akpi-v{color:var(--g)}
  .akpi.b .akpi-v{color:var(--b)}
  .akpi.gl .akpi-v{color:var(--gl2)}
  .akpi.w .akpi-v{color:var(--warn)}

  /* Two column grid */
  .acol2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
  .acol3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .apanel{background:white;border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
  .apanel-hdr{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:#fafcfa}
  .apanel-t{font-size:14px;font-weight:900;color:var(--txt)}
  .apanel-act{font-size:12px;font-weight:800;color:var(--g);cursor:pointer;background:none;border:none;font-family:var(--fn)}
  .apanel-body{padding:12px 18px 18px}

  /* Planning table */
  .plan-tbl{width:100%;border-collapse:separate;border-spacing:0;background:white;border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
  .plan-tbl th{background:#fafcfa;padding:12px 10px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--txtm);text-align:left;border-bottom:1px solid var(--bdr)}
  .plan-tbl th.today{background:var(--g3);color:var(--g2)}
  .plan-tbl td{padding:6px 8px;vertical-align:top;border-bottom:1px solid var(--bdr);min-height:68px;width:14.28%}
  .plan-tbl td.hrc{background:#fafcfa;font-size:13px;font-weight:900;color:var(--txt2);text-align:center;width:68px;padding:10px 8px}
  .plan-tbl td.today{background:#f7fcf8}
  .plan-chip{background:var(--g3);border-left:3px solid var(--g);border-radius:6px;padding:7px 9px;margin-bottom:5px;cursor:pointer;transition:transform .1s}
  .plan-chip:hover{transform:translateX(1px);background:var(--g4)}
  .plan-chip.ev{border-left-color:var(--gl);background:var(--gl3)}
  .plan-chip-nom{font-size:12px;font-weight:800;color:var(--txt);line-height:1.25;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .plan-chip-m{font-size:10px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:4px}
  .plan-chip-m b{color:var(--g2)}

  /* Data table */
  .dtbl{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden}
  .dtbl th{background:#fafcfa;padding:11px 14px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.7px;color:var(--txtm);text-align:left;border-bottom:1.5px solid var(--bdr);position:sticky;top:0}
  .dtbl td{padding:12px 14px;font-size:13px;color:var(--txt);border-bottom:1px solid var(--bdr);font-weight:600}
  .dtbl tr{cursor:pointer;transition:background .1s}
  .dtbl tr:hover td{background:#fafcfa}
  .dtbl tr:last-child td{border-bottom:none}

  /* Filters row */
  .afil{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .afil-lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--txtm);align-self:center;margin-right:4px}

  /* Monitor cards */
  .mon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .mon-card{background:white;border:1px solid var(--bdr);border-radius:12px;padding:18px;transition:border-color .15s;cursor:pointer}
  .mon-card:hover{border-color:var(--g)}
  .mon-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .mon-av{width:48px;height:48px;border-radius:50%;background:var(--g);color:white;font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center}
  .mon-nm{font-size:16px;font-weight:900;color:var(--txt)}
  .mon-rol{font-size:11px;color:var(--txtm);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .mon-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:12px;border-top:1px solid var(--bdr)}
  .mon-stat{text-align:center}
  .mon-stat-v{font-size:18px;font-weight:900;color:var(--g)}
  .mon-stat-l{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--txtm);margin-top:2px}

  /* Activity list */
  .alist-it{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr);align-items:flex-start}
  .alist-it:last-child{border:none}
  .alist-av{width:34px;height:34px;border-radius:50%;background:var(--g3);color:var(--g2);font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .alist-body{flex:1;min-width:0}
  .alist-top{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:2px}
  .alist-top b{color:var(--g2);font-weight:900}
  .alist-sub{font-size:11px;color:var(--txtm);font-weight:700}
  .alist-star{font-size:13px;font-weight:900;color:var(--warn);flex-shrink:0}

  /* Session detail in admin shell */
  body.admin-pc .ashell-sess{background:white;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;max-width:820px}
  body.admin-pc .ashell-sess .sec-hdr{margin:0}

  /* Charts */
  .bar-row{display:grid;grid-template-columns:130px 1fr 50px;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--bdr)}
  .bar-row:last-child{border:none}
  .bar-lbl{font-size:13px;font-weight:700;color:var(--txt)}
  .bar-trk{height:10px;background:var(--bg);border-radius:5px;overflow:hidden}
  .bar-fl{height:100%;border-radius:5px;transition:width .4s}
  .bar-val{font-size:14px;font-weight:900;color:var(--txt2);text-align:right}

  /* Idea card in admin */
  .aidea{background:white;border:1px solid var(--bdr);border-left:3px solid var(--b);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:grid;grid-template-columns:1fr 150px;gap:14px;align-items:flex-start}
  .aidea.aprobada{border-left-color:var(--g)}
  .aidea.probar{border-left-color:var(--gl)}
  .aidea.descartada{border-left-color:#aaa;opacity:.7}
  .aidea-m{font-size:11px;color:var(--txtm);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .aidea-t{font-size:14px;font-weight:600;color:var(--txt);line-height:1.5}

  /* Forms */
  .fld{margin-bottom:12px}
  .fld label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--txtm);display:block;margin-bottom:6px}
  .fld input,.fld select,.fld textarea{width:100%;background:white;border:1.5px solid var(--bdr);border-radius:8px;padding:10px 12px;font-family:var(--fn);font-size:13px;font-weight:600;color:var(--txt);outline:none}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--g)}

  /* Override eval section to be wider */
  body.admin-pc .eval-section{max-width:820px}
}

/* Narrow admin fallback — PC user on narrow browser */
@media(max-width:959px){
  body.admin-pc .ashell-only{display:none}
}

/* ══════════════════════════════════════════════
   MODAL (v5)
   ══════════════════════════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,40,15,.55);backdrop-filter:blur(3px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fu .2s ease}
.modal{background:white;border-radius:14px;width:100%;max-width:640px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--g);color:white;border-radius:14px 14px 0 0}
.modal-hdr-t{font-size:16px;font-weight:900}
.modal-close{background:rgba(255,255,255,.2);border:none;color:white;width:32px;height:32px;border-radius:7px;font-size:15px;cursor:pointer;font-family:var(--fn)}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-ftr{padding:14px 20px;border-top:1px solid var(--bdr);display:flex;gap:10px;justify-content:flex-end;background:#fafcfa;border-radius:0 0 14px 14px}

/* Search input */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;background:white;border:1.5px solid var(--bdr);border-radius:9px;padding:11px 14px 11px 40px;font-family:var(--fn);font-size:14px;font-weight:600;color:var(--txt);outline:none}
.search-wrap input:focus{border-color:var(--g)}
.search-wrap::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.5}

/* Toggle tabs */
.tabs{display:inline-flex;background:#fafcfa;border:1px solid var(--bdr);border-radius:10px;padding:3px;gap:2px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:8px;border:none;background:transparent;font-family:var(--fn);font-size:13px;font-weight:800;color:var(--txt2);cursor:pointer;transition:all .15s}
.tab.on{background:var(--g);color:white}
.tab:hover:not(.on){background:var(--bg)}

/* Month grid (planning mensual) */
.mo-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:var(--bdr);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.mo-h{background:#fafcfa;padding:10px 6px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--txtm);text-align:center}
.mo-d{background:white;min-height:86px;padding:6px 7px;font-size:11px;position:relative}
.mo-d.other{background:#fafbfa;color:var(--txtm)}
.mo-d.today{background:var(--g3);border:2px solid var(--g);padding:4px 5px}
.mo-d-n{font-size:13px;font-weight:900;color:var(--txt);margin-bottom:4px}
.mo-d.other .mo-d-n{color:var(--txtm);font-weight:700}
.mo-chip{font-size:10px;font-weight:700;background:var(--gl3);border-left:2px solid var(--gl);padding:2px 5px;border-radius:3px;margin-bottom:2px;line-height:1.25;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mo-chip.pend{background:var(--g3);border-left-color:var(--g)}
.mo-chip:hover{filter:brightness(.96)}
.mo-more{font-size:10px;color:var(--b);font-weight:800;margin-top:2px;cursor:pointer}

/* Day card (tabla search results) */
.edit-btn{padding:6px 10px;border-radius:6px;background:var(--b3);border:1px solid var(--b);color:var(--b2);font-family:var(--fn);font-size:11px;font-weight:800;cursor:pointer;margin-right:4px}
.del-btn{padding:6px 10px;border-radius:6px;background:var(--reds);border:1px solid var(--red);color:var(--red);font-family:var(--fn);font-size:11px;font-weight:800;cursor:pointer}
.edit-btn:hover,.del-btn:hover{filter:brightness(.95)}

/* Date range selector */
.daterange{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.daterange label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--txtm);margin:0}
.daterange input{background:white;border:1.5px solid var(--bdr);border-radius:7px;padding:8px 10px;font-family:var(--fn);font-size:13px;font-weight:600;color:var(--txt);outline:none}
.daterange input:focus{border-color:var(--g)}

/* Decorative wave (brand from manual) */
.brand-wave{position:absolute;bottom:0;right:0;width:280px;height:140px;pointer-events:none;opacity:.06;overflow:hidden}
.brand-wave svg{width:100%;height:100%}
</style>

 arranque:'Umeentzako igerilekuan "Calabín calavera" jolasean.',
 intencionada:`"Udazkeneko zuhaitza": Bi tapiz handiekin, fantasma batekin eta koloretako hosto-kubo batekin bi zuhaitz sortuko ditugu. Udazkena heldu da: hostoak zuhaitzatik kendu eta kubora eramango ditugu (eskailera gainean). Banan-banan, gero binaka, forma aldatuz.\n\n"Hego aldera joaten gara": Txori bihurtuta bidaia egin behar dugu. Zirkuituaren bidez paradisuraldera: 1) Lasterka hegaka 2) Irla batera iritsi 3) Hodaietatik pasa (aroa) 4) Mendiak biratu (taulak zigzag) 5) Azken salto (zuloaren barruan). 2 buelta: lehenengoa nahi bezala; bigarrenean haize handia dago — estazio bakoitzean birada bat eman behar da.\n\n"Jaten eta eguzkitan atseden": Igerileku irregularrean (paradisua). Aro-janaria batu eta ondo jan ostean uretan lo egiten saiatuko gara.`,

{id:'S23-4',cod:'S23',nom:'Nire ipuinak igerilekuan',nom_es:'Cuentos en la piscina — La liebre y la tortuga',adina:'4 urte',inst:'Jolas-igerilekua',pto:'1. eskaileran, uretik kanpo',

 intencionada:`Ipuina kontatzen dugu (laburki): Erbia beti barre egiten zuen dortokari, astia zelako. Erbia eta dortokak lasterketa bat egin zuten. Erbia lasterka atera zen... [ipuin osoa kontatuz jarduera garatzen da]\n\nTxurroarekin eta erbiaren irudiarekin, bere mugimenduak imitatzen ditugu. Salto egin!\n\n4 pull-boy-ekin dortokaren urratsak imitatzen ditugu: ibilaldi bakoitzeko urrats bat eman dezakegu.\n\nAzkenean... dortokak irabazi du!`,

{id:'S35-4',cod:'S35',nom:'Animaleen puzzleak',nom_es:'Los puzzles de los animales',adina:'4 urte',inst:'Jolas-igerilekua',pto:'Irregularrean, umeentzako igerilekuaren ondoan',

{id:'S13-5',cod:'S13',nom:'Espantagailua nire igerilekuan',nom_es:'Un espantapájaros en mi piscina',adina:'5 urte',inst:'Nata 2',pto:'Kanpoko tapiza',

 arranque:'"ALDATZEN DIZUT" jolasa: Bikoteka uretan sartzen gara fantasmarekin. Irakaslearen seinalearen arabera bikotea aldatu behar dugu. 5 aldaketa egingo ditugu eta ezin da konpainero bera errepikatu.',
 intencionada:`Estazioetan banatutako materiala: UDAZKENA-gerrikoak / UDA-txurroak / NEGUA-pull-boyak / UDABERRIA-fantasmak\n\n"FANTASMARI JANTZIKO DIOGU": Estazioei buruzko azalpena laburra, marrazkiekin. Estazio bakoitzean materiala nahasita egongo da uretan — banan-banan atera eta motiboka ordenatu tapizean.\n\nOndoren BINAKA fantasma jantzi eta uraren bidez eraman:\n— Igerilekua biratu eta fantasmari jarri.\n— Bide berdina uraren barruan, ezer erori gabe.\n— Fantasma biluztu eta materiala bere tokian utzi.`,
 reflexion:'Nata 2-n autonomia aldaketarako. Urtaroak. Materialarekin autonomia. Talde-lana.'},

{id:'S18-5',cod:'S18',nom:'Inurriak',nom_es:'Las hormigas',adina:'5 urte',inst:'Nata 2',pto:'Erdiko eskaileran',

 intencionada:`"Inurriak gara": Bi talde egingo ditugu. Errenkadan mugituko gara bata bestearen atzetik. Inurri erregina/erlea lehena izango da eta nola mugitu erabakiko du (erregina aldatuz joango gara).\n\n"Inurriak bezala lan egiten dugu": Materiala nahasita igerilekuaren beste muturrean dago. Batera bestera eraman behar dugu gure kueba eraikitzeko:\n— Lehenengo bidaia: Bakoitzak gauza bakarra.\n— Binaka: zer eramaten erabakitzen dugu.\n— Hirukoak, laurdanak...\n— Tapiza azkena eramaten da: inurri erregina beste guztiak arrastatuta (koordinatu behar gara).\n\nAro lastarrekin zirkuitua: hainbat ibilbide proposatu eta "inurriek arazoak modu ezberdinetan konpondu ditzakete".`,

(function initSeason(){
  const now=new Date(TODAY+'T12:00:00');
  const y=now.getFullYear(),m=now.getMonth(); // 0-11
  // Si mes >= agosto (7), temporada empieza ese año; si no, empezó el año anterior
  const startY=m>=7?y:y-1;
  S.monFrom=`${startY}-09-01`;
  S.monTo=`${startY+1}-06-30`;
})();

const DB = {
  g(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  s(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  // Sessions: overlayed user edits/additions on top of SESSIONS constant
  _customKey:'ne5_sess_custom',   // {id: overrideObject}
  _deletedKey:'ne5_sess_deleted', // [id,...]
  _newKey:'ne5_sess_new',         // [newSessionObject,...]
  sessions(){
    const custom=this.g(this._customKey,{});
    const deleted=this.g(this._deletedKey,[]);
    const news=this.g(this._newKey,[]);
    const base=SESSIONS.filter(s=>!deleted.includes(s.id)).map(s=>custom[s.id]?{...s,...custom[s.id]}:s);
    return[...base,...news];
  },
  saveSession(ss){
    // If exists in SESSIONS → goes to custom overrides; else → news
    const isBase=SESSIONS.some(s=>s.id===ss.id);
    if(isBase){
      const c=this.g(this._customKey,{});c[ss.id]=ss;this.s(this._customKey,c);
    }else{
      const news=this.g(this._newKey,[]);
      const i=news.findIndex(s=>s.id===ss.id);
      if(i>=0)news[i]=ss;else news.push(ss);
      this.s(this._newKey,news);
    }
  },
  deleteSession(id){
    const isBase=SESSIONS.some(s=>s.id===id);
    if(isBase){
      const del=this.g(this._deletedKey,[]);if(!del.includes(id))del.push(id);this.s(this._deletedKey,del);
    }else{
      const news=this.g(this._newKey,[]).filter(s=>s.id!==id);this.s(this._newKey,news);
    }
  },
  nextSessionCode(){
    // Generate next free Sxx code
    const all=this.sessions();
    const nums=all.map(s=>{const m=(s.cod||'').match(/^S(\d+)$/);return m?parseInt(m[1]):0;});
    const max=Math.max(0,...nums);
    return'S'+String(max+1).padStart(2,'0');
  },
  entries(){return this.g('ne3_entries',ENTRIES)},
  evals(){return this.g('ne3_evals',[])},
  ideas(){return this.g('ne3_ideas',SAMPLE_IDEAS)},
  getEval(eid){return this.evals().find(e=>e.eid===eid)||null},
  setEval(ev){const a=this.evals();const i=a.findIndex(e=>e.eid===ev.eid);if(i>=0)a[i]=ev;else a.push(ev);this.s('ne3_evals',a)},
  addIdea(idea){const a=this.ideas();a.push(idea);this.s('ne3_ideas',a)},
  setIdeaStatus(id,st){const a=this.ideas();const i=a.findIndex(x=>x.id===id);if(i>=0){a[i].est=st;this.s('ne3_ideas',a)}},
  apiKey(){return localStorage.getItem('ne3_key')||''}
};

function weekOf(anchor){const d=new Date(anchor+'T12:00:00'),dw=d.getDay(),diff=dw===0?-6:1-dw,mon=new Date(d);mon.setDate(d.getDate()+diff);
  return Array.from({length:6},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x.toISOString().split('T')[0]})}
function dayLabel(ds){return new Date(ds+'T12:00:00').toLocaleDateString('eu-ES',{weekday:'short'}).toUpperCase().replace('.','').slice(0,2)}
function dayNum(ds){return new Date(ds+'T12:00:00').getDate()}
function fmtDate(ds){const d=new Date(ds+'T12:00:00');return d.toLocaleDateString('eu-ES',{weekday:'long',day:'numeric',month:'long'})}

function myEntries(day){

function evalPct(){
  const all=DB.entries();const evs=DB.evals();
  const mine=all.filter(e=>S.role==='admin'||e.mon===S.user);
  const done=mine.filter(e=>evs.find(v=>v.eid===e.id));
  return mine.length>0?Math.round(done.length/mine.length*100):0;
}

function vReports(){
  const evals=DB.evals(),entries=DB.entries(),sessions=DB.sessions();
  if(!evals.length)return`${nav('reports')}${hdr('',false)}<div class="main fu"><div class="empty"><div class="empty-i">📊</div><div class="empty-t">Oraindik baloraziorik ez</div><div style="font-size:13px;color:var(--txtm);margin-top:6px">Monitoreak balorazioak egin ondoren agertuko dira</div></div></div>`;
  const wg=evals.filter(e=>e.global);
  const avg=wg.length?(wg.reduce((a,e)=>a+(e.global||0),0)/wg.length).toFixed(1):'—';
  const crits=['zailtasuna','iraupena','parte','maila','materiala','ikaskuntza'];
  const critL=['Zailtasuna','Iraupena','Parte-hartzea','Mailaren egok.','Materiala','Ikaskuntza'];
  return`
${nav('reports')}
${hdr('',false)}
<div class="main fu">
  <div class="sh">Laburpena</div>
  <div class="g3" style="margin-bottom:16px">
    <div class="mc"><div class="mv">${evals.length}</div><div class="ml">Baloratuta</div></div>
    <div class="mc"><div class="mv">${avg}</div><div class="ml">Batez beste ★</div></div>
    <div class="mc"><div class="mv">${entries.length}</div><div class="ml">Saio guztira</div></div>
  </div>
  <div class="sh">Irizpideak</div>
  <div class="card">
    ${crits.map((c,i)=>{
      const vs=evals.filter(e=>e[c]!==undefined).map(e=>e[c]);
      const av=vs.length?(vs.reduce((a,b)=>a+b,0)/vs.length):0;
      const col=av>=1?'var(--gl)':av>=0?'var(--b)':'var(--red)';
      return`<div class="bw"><div class="bl"><span>${critL[i]}</span><b>${av.toFixed(1)}</b></div>
      <div class="bt"><div class="bf" style="width:${(av+2)/4*100}%;background:${col}"></div></div></div>`;
    }).join('')}
  </div>
  <div class="sh">Monitoreka</div>
  <div class="card">
    ${MONITORS.map(m=>{
      const me=evals.filter(e=>e.mon===m);if(!me.length)return'';
      const mg=me.filter(e=>e.global);
      const mav=mg.length?(mg.reduce((a,e)=>a+e.global,0)/mg.length).toFixed(1):'—';
      return`<div class="mat-item">
        <div style="width:34px;height:34px;border-radius:50%;background:var(--g3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--g2);flex-shrink:0">${m}</div>
        <div style="flex:1"><div style="font-weight:800;font-size:14px">${m}</div><div style="font-size:12px;color:var(--txtm)">${me.length} balorazioak</div></div>
        <div style="color:var(--warn);font-weight:900">★ ${mav}</div>
      </div>`;
    }).join('')}
  </div>
  <div class="sh">Azken iruzkinak</div>
  <div class="card">
    ${evals.filter(e=>e.ohar).slice(-4).map(ev=>{
      const en=entries.find(e=>e.id===ev.eid),ss=sessions.find(s=>s.id===ev.sid);
      if(!ss||!en)return'';
      return`<div style="padding:9px 0;border-bottom:1px solid var(--bdr)">
        <div style="font-size:11px;color:var(--txtm);margin-bottom:3px;font-weight:700">${ev.mon} · ${ss.nom} · ${en.data}</div>
        <div style="font-size:13px;font-weight:600;color:var(--txt)">${ev.ohar}</div>
      </div>`;
    }).join('')||'<div style="font-size:13px;color:var(--txtm)">Oraindik iruzkinik ez</div>'}
  </div>
  <button class="btn btn-o" id="export-btn" style="margin-top:8px">📄 Txostena esportatu (.txt)</button>
</div>`}

function aPlanning(){
  const entries=DB.entries();

    <button class="tab${mode==='week'?' on':''}" data-plan-mode="week">📆 Astekoa</button>
    <button class="tab${mode==='month'?' on':''}" data-plan-mode="month">🗓️ Hilabetekoa</button>
  </div>`;

  if(mode==='week'){
    const days=weekOf(S.selDay||TODAY);
    const hours=[...new Set(entries.filter(e=>days.includes(e.data)).map(e=>e.hora))].sort();
    if(hours.length===0)hours.push('17:00','17:40','18:20','19:00');
    const prev=isoDate(days[0],-7), next=isoDate(days[0],7);

    return`${aTopbar('Planninga','Astearen ikuspegi orokorra',`
      <button class="atop-btn sec" data-day="${prev}">← Aurreko</button>
      <button class="atop-btn sec" data-day="${TODAY}">📅 Gaur</button>
      <button class="atop-btn sec" data-day="${next}">Hurrengoa →</button>
    `)}
    <div class="abody fu">
      ${toggle}
      <div style="height:12px"></div>
      <table class="plan-tbl">
        <thead>
          <tr>
            <th style="width:68px">ORDUA</th>
            ${days.map(d=>`<th class="${d===TODAY?'today':''}">${dayLabel(d)} <span style="float:right;font-weight:900;color:var(--txt)">${dayNum(d)}</span></th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${hours.map(h=>`<tr>
            <td class="hrc">${h}</td>
            ${days.map(d=>{
              const cells=entries.filter(e=>e.data===d&&e.hora===h);
              return`<td class="${d===TODAY?'today':''}">
                ${cells.map(en=>{
                  const ss=sessions.find(s=>s.id===en.sid);if(!ss)return'';
                  const ev=DB.getEval(en.id);
                  return`<div class="plan-chip ${ev?'ev':''}" data-click="go('session',{selEid:'${en.id}',selSid:'${ss.id}'})">
                    <div class="plan-chip-nom">${ss.nom}</div>
                    <div class="plan-chip-m"><b>${en.mon}</b> · ${en.grupo.replace(/urte.*/,'u.')}</div>
                  </div>`;
                }).join('')}
              </td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>

      <div style="margin-top:16px;display:flex;gap:16px;align-items:center;font-size:12px;color:var(--txtm);font-weight:700">
        <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:14px;background:var(--g3);border-left:3px solid var(--g);border-radius:3px"></span>Zain</div>
        <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:14px;background:var(--gl3);border-left:3px solid var(--gl);border-radius:3px"></span>Baloratuta</div>
        <div style="margin-left:auto">Guztira aste honetan: <b style="color:var(--txt)">${entries.filter(e=>days.includes(e.data)).length} saio</b></div>
      </div>
    </div>`;
  }

  // MONTH MODE
  const anchor=S.selDay||TODAY;
  const d=new Date(anchor+'T12:00:00');
  const monthStart=new Date(d.getFullYear(),d.getMonth(),1);
  const monthEnd=new Date(d.getFullYear(),d.getMonth()+1,0);
  // Lunes-first: getDay() is 0=sun..6=sat; want offset to monday
  const startDow=(monthStart.getDay()+6)%7;
  const gridStart=new Date(monthStart);gridStart.setDate(monthStart.getDate()-startDow);
  const cells=[];
  for(let i=0;i<42;i++){const c=new Date(gridStart);c.setDate(gridStart.getDate()+i);cells.push(c.toISOString().split('T')[0]);if(cells.length>=35&&c>=monthEnd)break;}
  const prevMonth=new Date(d.getFullYear(),d.getMonth()-1,15).toISOString().split('T')[0];
  const nextMonth=new Date(d.getFullYear(),d.getMonth()+1,15).toISOString().split('T')[0];
  const monthName=d.toLocaleDateString('eu-ES',{month:'long',year:'numeric'});
  const monthEntries=entries.filter(e=>{const ed=new Date(e.data+'T12:00:00');return ed>=monthStart&&ed<=monthEnd});

  return`${aTopbar('Planninga',monthName.charAt(0).toUpperCase()+monthName.slice(1),`
    <button class="atop-btn sec" data-day="${prevMonth}">← Aurrekoa</button>
    <button class="atop-btn sec" data-day="${TODAY}">📅 Gaur</button>
    <button class="atop-btn sec" data-day="${nextMonth}">Hurrengoa →</button>
  `)}
  <div class="abody fu">
    ${toggle}
    <div style="height:12px"></div>
    <div class="mo-grid">
      ${['AL','AR','AZ','OG','OR','LA','IG'].map(d=>`<div class="mo-h">${d}</div>`).join('')}
      ${cells.map(cd=>{
        const cdate=new Date(cd+'T12:00:00');
        const inMonth=cdate.getMonth()===d.getMonth();
        const isToday=cd===TODAY;
        const dayEntries=entries.filter(e=>e.data===cd).sort((a,b)=>a.hora.localeCompare(b.hora));
        const visibleChips=dayEntries.slice(0,3);
        const more=dayEntries.length-visibleChips.length;
        return`<div class="mo-d ${inMonth?'':'other'} ${isToday?'today':''}" data-day="${cd}" style="cursor:pointer">
          <div class="mo-d-n">${cdate.getDate()}</div>
          ${visibleChips.map(en=>{
            const ss=sessions.find(s=>s.id===en.sid);if(!ss)return'';
            const ev=DB.getEval(en.id);
            return`<div class="mo-chip ${ev?'':'pend'}" title="${en.hora} · ${ss.nom} · ${en.mon}">${en.hora.slice(0,5)} ${en.mon}</div>`;
          }).join('')}
          ${more>0?`<div class="mo-more">+${more} gehiago</div>`:''}
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:14px;display:flex;gap:16px;align-items:center;font-size:12px;color:var(--txtm);font-weight:700">
      <div>Hilabete honetan: <b style="color:var(--txt)">${monthEntries.length} saio</b></div>
      <div style="margin-left:auto">💡 Klikatu egunean egutegia irekitzeko</div>
    </div>
  </div>`;
}

// ─── IMPORT EXCEL (loads SheetJS on demand from CDN) ────────────
let _SHEETJS_LOADED=false;
function loadSheetJS(){
  return new Promise((res,rej)=>{
    if(_SHEETJS_LOADED||window.XLSX){_SHEETJS_LOADED=true;return res()}
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload=()=>{_SHEETJS_LOADED=true;res()};
    s.onerror=()=>rej(new Error('No se pudo cargar la librería Excel'));
    document.head.appendChild(s);
  });
}

async function handleImportFile(ev){
  const file=ev.target.files&&ev.target.files[0];if(!file)return;
  try{
    toast('Kargatzen...');
    await loadSheetJS();
    const data=await file.arrayBuffer();
    const wb=window.XLSX.read(data,{type:'array'});
    const sheet=wb.Sheets[wb.SheetNames[0]];
    const rows=window.XLSX.utils.sheet_to_json(sheet,{defval:''});
    if(!rows.length){toast('Fitxategi hutsa');return}
    // Try to map common column names (flexible)
    const norm=s=>(s||'').toString().toLowerCase().trim();
    const pickCol=(row,keys)=>{for(const k of Object.keys(row)){if(keys.includes(norm(k)))return row[k]}return''};
    let imported=0,skipped=0;
    for(const r of rows){
      const cod=pickCol(r,['kodea','codigo','código','code','id']);
      const nom=pickCol(r,['izena','nombre','name','nom','titulo','título']);
      const adina=pickCol(r,['adina','edad','age']);
      if(!cod||!nom){skipped++;continue}
      const ss={
        id:'imp_'+Date.now()+'_'+imported,
        cod:String(cod).trim(),
        nom:String(nom).trim(),
        nom_es:pickCol(r,['nombre_es','castellano','nom_es','spanish'])||'',
        adina:String(adina||'3 urte').trim(),
        inst:String(pickCol(r,['instalazioa','instalacion','instalación','facility'])||'').trim(),
        pto:String(pickCol(r,['puntua','punto','meeting_point','pto'])||'').trim(),
        materiala:String(pickCol(r,['materiala','material','materials'])||'').split(/[,;\n]/).map(x=>x.trim()).filter(Boolean),
        arranque:String(pickCol(r,['arranque','hasiera','hasierako jarduera','intro'])||'').trim(),
        intencionada:String(pickCol(r,['intencionada','jarduera nagusia','main','principal'])||'').trim(),
        reflexion:String(pickCol(r,['reflexion','reflexión','hausnarketa','reflection'])||'').trim(),
      };
      DB.saveSession(ss);imported++;
    }
    closeModal();
    toast(`✓ ${imported} saio inportatu · ${skipped} saltatu`);
    render();
  }catch(e){
    console.error(e);toast('Errore: '+e.message);
  }
}

function aMonitors(){
  const entries=DB.entries();
  const evals=DB.evals();
  const from=S.monFrom,to=S.monTo;
  const inRange=dateStr=>{
    if(!from&&!to)return true;
    if(from&&dateStr<from)return false;
    if(to&&dateStr>to)return false;
    return true;
  };

  // Season helpers
  function getSeason(offset=0){
    const now=new Date(TODAY+'T12:00:00');
    const y=now.getFullYear(),m=now.getMonth();
    const startY=(m>=7?y:y-1)+offset;
    return{from:`${startY}-09-01`,to:`${startY+1}-06-30`,label:`Denboraldia ${startY}-${(startY+1).toString().slice(2)}`};
  }
  const curSeason=getSeason(0),prevSeason=getSeason(-1);
  // Determine which preset is selected
  const isCur=from===curSeason.from&&to===curSeason.to;
  const isPrev=from===prevSeason.from&&to===prevSeason.to;
  const isAll=!from&&!to;

  return`${aTopbar('Monitoreak','Taldearen ikuspegia eta jarraipena','')}
  <div class="abody fu">
    <div class="apanel" style="margin-bottom:16px">

            <button class="tab${isCur?' on':''}" data-mon-preset="current">${curSeason.label}</button>
            <button class="tab${isPrev?' on':''}" data-mon-preset="previous">${prevSeason.label}</button>
            <button class="tab${isAll?' on':''}" data-mon-preset="all">Osoa</button>
          </div>
          <div style="width:100%;height:1px;background:var(--bdr);margin:6px 0"></div>
          <label>Noiztik:</label>
          <input type="date" id="mon-from" value="${from||''}">
          <label>Noiz arte:</label>
          <input type="date" id="mon-to" value="${to||''}">
          <button class="atop-btn sec" id="mon-apply">Aplikatu</button>

        </div>
      </div>

    <div class="mon-grid">
      ${MONITORS.map(m=>{
        const mEntries=entries.filter(e=>e.mon===m&&inRange(e.data));
        const mEvals=evals.filter(e=>e.mon===m&&(!e.data||inRange(e.data)));

        const avg=mGlob.length?(mGlob.reduce((a,e)=>a+e.global,0)/mGlob.length).toFixed(1):'—';
        const pct=mEntries.length?Math.round(mEvals.length/mEntries.length*100):0;
        return`<div class="mon-card">

const SYS_PROMPT=`Natazio hezitzaileko aditua zara, 20 urte baino gehiagoko esperientziarekin. Metodologia akuatikoan, haur eta nerabeekin (3-14 urte) lan egiten duzun irakaslea zara. Ikasleen garapen motorea, propiotzepzioa akuatikoa, segurtasuna eta ikaskuntza ludikoa ezagutzen dituzu. Erantzunak zuzenak eta praktikoak dira, monitore baten artean bezala. Aldaketak edo hobekuntzak proposatzen dituenean, zehatza izan eta adibide espezifikoak eman. Euskaraz edo gaztelaniaz erantzun, galdetzen duen hizkuntzaren arabera.`;

async function askClaude(msgs){
  const k=DB.apiKey();
  if(!k)return'API Key gabe. Konfiguratu mesedez.';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS_PROMPT,messages:msgs})
    });
    const d=await r.json();
    if(d.error)return`Errore: ${d.error.message}`;
    return d.content[0].text;
  }catch(e){return`Konexio errorea: ${e.message}`}
}

async function sendChat(){
  const inp=document.getElementById('chat-in');if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';
  S.chat.push({r:'user',t:txt});
  const box=document.getElementById('chat-box');
  if(box){const ld=document.createElement('div');ld.className='msg msg-a pulse';ld.id='loading-msg';ld.textContent='Pentsatzen...';box.appendChild(ld);box.scrollTop=box.scrollHeight;}
  const resp=await askClaude(S.chat.map(m=>({role:m.r==='user'?'user':'assistant',content:m.t})));
  S.chat.push({r:'assistant',t:resp});
  render();
}

function attachEvents(){

  const bb=document.getElementById('back-btn');if(bb)bb.addEventListener('click',goBack);

  const lob=document.getElementById('logout-btn');if(lob)lob.addEventListener('click',()=>{

    S.role=null;S.user=null;S._role=null;S._ini=null;S.chat=[];
    document.body.classList.remove('admin-pc');
    go('login');
  });

  // ─── v5 HANDLERS ───
  // Planning mode toggle
  document.querySelectorAll('[data-plan-mode]').forEach(b=>b.addEventListener('click',()=>{S.planMode=b.dataset.planMode;render()}));
  // Library search (live)
  const lsrch=document.getElementById('lib-search');
  if(lsrch){
    lsrch.addEventListener('input',()=>{S.libSearch=lsrch.value;
      // Only update filtered rows without re-rendering whole page (preserves focus)
      const ev=new Event('input-updated');lsrch.dispatchEvent(ev);
      // Simple approach: re-render and re-focus
      const pos=lsrch.selectionStart;render();
      const n=document.getElementById('lib-search');if(n){n.focus();try{n.setSelectionRange(pos,pos)}catch{}}
    });
  }
  // New session
  const nsb=document.getElementById('new-session-btn');if(nsb)nsb.addEventListener('click',openNewSession);
  // Import
  const ipb=document.getElementById('import-btn');if(ipb)ipb.addEventListener('click',()=>{S.modal={type:'import'};render()});
  const ipf=document.getElementById('imp-file');if(ipf)ipf.addEventListener('change',handleImportFile);

  document.querySelectorAll('[data-del-sid]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();confirmDeleteSession(b.dataset.delSid)}));

  const mbg=document.getElementById('modal-bg');if(mbg)mbg.addEventListener('click',e=>{if(e.target===mbg)closeModal()});
  // Monitor date range presets
  document.querySelectorAll('[data-mon-preset]').forEach(b=>b.addEventListener('click',()=>{
    const p=b.dataset.monPreset;
    const now=new Date(TODAY+'T12:00:00');

    const startY=m>=7?y:y-1;
    if(p==='current'){S.monFrom=`${startY}-09-01`;S.monTo=`${startY+1}-06-30`}
    else if(p==='previous'){S.monFrom=`${startY-1}-09-01`;S.monTo=`${startY}-06-30`}
    else if(p==='all'){S.monFrom='';S.monTo=''}
    render();
  }));
  const mfa=document.getElementById('mon-apply');if(mfa)mfa.addEventListener('click',()=>{
    const f=document.getElementById('mon-from')?.value||'';
    const t=document.getElementById('mon-to')?.value||'';
    S.monFrom=f;S.monTo=t;render();
  });
  // ROLE BUTTONS
  const rm=document.getElementById('role-mon');const ra=document.getElementById('role-adm');
  if(rm)rm.addEventListener('click',()=>{S._role='monitor';rm.classList.add('sel');if(ra)ra.classList.remove('sel');document.getElementById('ini-wrap').style.display='block';document.getElementById('pw-wrap').style.display='none';chkLogin()});
  if(ra)ra.addEventListener('click',()=>{S._role='admin';ra.classList.add('sel');if(rm)rm.classList.remove('sel');document.getElementById('ini-wrap').style.display='none';document.getElementById('pw-wrap').style.display='block';chkLogin()});
  // INI BUTTONS
  document.querySelectorAll('.ini-btn').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.ini-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');S._ini=b.dataset.ini;chkLogin();
  }));
  const pw=document.getElementById('pw');if(pw)pw.addEventListener('input',chkLogin);
  // LOGIN
  const lb=document.getElementById('login-btn');if(lb)lb.addEventListener('click',()=>{
    if(S._role==='admin'){if(pw.value!=='admin123'){toast('Pasahitz okerra');return}S.role='admin';S.user='ADMIN';}
    else{S.role='monitor';S.user=S._ini;}go('home');
  });
  // SESSION CLICK
  document.querySelectorAll('[data-click]').forEach(el=>el.addEventListener('click',()=>{eval(el.dataset.click)}));
  // CALENDAR DAYS
  document.querySelectorAll('[data-day]').forEach(el=>el.addEventListener('click',()=>{S.selDay=el.dataset.day;render()}));
  // LIB FILTER
  document.querySelectorAll('[data-lf]').forEach(el=>el.addEventListener('click',()=>{S.libFilter=el.dataset.lf;render()}));
  // IDEA FILTER
  document.querySelectorAll('[data-if]').forEach(el=>el.addEventListener('click',()=>{S.ideaFilter=el.dataset.if;render()}));
  // EVAL CRITS
  document.querySelectorAll('[data-crit]').forEach(btn=>btn.addEventListener('click',()=>saveCrit(btn.dataset.crit,parseInt(btn.dataset.val))));
  // STARS
  document.querySelectorAll('[data-star]').forEach(st=>st.addEventListener('click',()=>saveStar(parseInt(st.dataset.star))));
  // COMMENTS — auto-save on blur
  const oh=document.getElementById('cmt-ohar');if(oh)oh.addEventListener('blur',()=>saveComment('ohar',oh.value));
  const ih=document.getElementById('cmt-idea');if(ih)ih.addEventListener('blur',()=>saveIdeaFromEval(ih.value));
  // IDEAS
  const aib=document.getElementById('add-idea-btn');if(aib)aib.addEventListener('click',()=>{
    const t=document.getElementById('new-idea')?.value?.trim();
    if(!t){toast('Idazki zerbait lehenik');return}
    DB.addIdea({id:'i'+Date.now(),mon:S.user,sid:null,txt:t,est:'pendiente',data:TODAY});
    toast('Ideia gordeta ✓');render();
  });
  // IDEA STATUS
  document.querySelectorAll('[data-idea-id]').forEach(sel=>sel.addEventListener('change',()=>DB.setIdeaStatus(sel.dataset.ideaId,sel.value)));
  // CHAT
  const cs=document.getElementById('chat-send');if(cs)cs.addEventListener('click',sendChat);
  const ci=document.getElementById('chat-in');if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter')sendChat()});
  document.querySelectorAll('[data-qp]').forEach(b=>b.addEventListener('click',()=>{
    S.chat=[];S.chat.push({r:'user',t:b.dataset.qp});render();
    setTimeout(async()=>{const resp=await askClaude([{role:'user',content:b.dataset.qp}]);S.chat.push({r:'assistant',t:resp});render();},100);
  }));
  const clc=document.getElementById('clear-chat');if(clc)clc.addEventListener('click',()=>{S.chat=[];render()});
  const gkb=document.getElementById('go-key-btn');if(gkb)gkb.addEventListener('click',()=>{const k=prompt('Sartu Anthropic API Key:');if(k){localStorage.setItem('ne3_key',k);toast('API Key gordeta ✓');render();}});
  // EXPORT
  const ex=document.getElementById('export-btn');if(ex)ex.addEventListener('click',exportReport);
}

function chkLogin(){
  const lb=document.getElementById('login-btn');if(!lb)return;
  const ok=S._role==='admin'?(document.getElementById('pw')?.value?.length>=4):(S._ini!==null);
  lb.disabled=!ok;
}

// ─────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────
render();
</script>
</body>
</html>
